
# Project-wide Gradle settings.
# See https://docs.gradle.org/current/userguide/build_environment.html

org.gradle.jvmargs=-Xmx1024m -Dfile.encoding=UTF-8

# ─────────────────────────────────────────────────────────────────────────────
# PLATFORM VERSIONS
# These are the only lines that need to change when upgrading the stack.
# All PH-EE Java components inherit these values via the BOM import.
# ─────────────────────────────────────────────────────────────────────────────

# Spring Boot — governs Spring Framework, Spring Security, Hibernate ORM,
# Micrometer, Tomcat, Logback, Jackson, HikariCP, and all Spring starters.
springBootVersion=3.4.4

# Apache Camel Spring Boot — governs all camel-*-starter and camel-core modules.
camelVersion=4.4.1

# Zeebe / Camunda — not included in Spring Boot or Camel BOMs.
zeebeVersion=8.4.1

# AWS SDK v2 — governs all software.amazon.awssdk:* modules.
# ph-ee-operations-app migrates from SDK v1 (com.amazonaws:1.11.x) to v2.
# SDK v1 and v2 use completely different package names and cannot coexist.
awsSdkVersion=2.29.0

# ─────────────────────────────────────────────────────────────────────────────
# JAKARTA EE 10
# Explicit version pins prevent legacy javax.* artifacts from leaking onto
# the classpath via transitive dependencies of third-party libraries.
# ─────────────────────────────────────────────────────────────────────────────
jakartaValidationVersion=3.0.2
jakartaServletVersion=6.0.0
jakartaAnnotationVersion=2.1.1
jakartaPersistenceVersion=3.1.0
jakartaXmlBindVersion=4.0.2
jakartaWsRsVersion=3.1.0

# ─────────────────────────────────────────────────────────────────────────────
# LIBRARY VERSIONS
# ─────────────────────────────────────────────────────────────────────────────

# Hibernate Validator — Jakarta Validation 3.x implementation.
# Replaces hibernate-validator 6.x (javax.validation).
hibernateValidatorVersion=8.0.1.Final

# JAXB runtime — required by connectors that process XML payloads.
jaxbRuntimeVersion=4.0.5

# Jackson — aligned with Spring Boot 3.4.4 managed version.
jacksonVersion=2.18.2

# Apache CXF — Jakarta EE 10 compatible version.
# Required for connectors using SOAP/REST via CXF (e.g., ph-ee-connector-ams-mifos).
# CXF 3.x uses javax.*; CXF 4.x uses jakarta.*.
cxfVersion=4.0.4

# SpringDoc OpenAPI — replaces the deprecated Springfox / springfox-swagger libraries.
# springfox 3.x is not compatible with Spring Boot 3; springdoc-openapi 2.x is.
springdocVersion=2.6.0

# Flyway — database migration. Flyway 10.x supports Java 21 and Jakarta.
flywayVersion=10.18.0

# Security & JWT
javaJwtVersion=4.4.0
nimbusJoseJwtVersion=9.40

# Apache Commons
commonsLang3Version=3.14.0
commonsCodecVersion=1.17.1
commonsIoVersion=2.16.1

# EclipseLink — Jakarta Persistence 3.0 implementation.
# EclipseLink 2.7.x (current in the ecosystem) implements javax.persistence and
# is incompatible with Spring Boot 3. EclipseLink 4.x implements jakarta.persistence.
# Used by: ph-ee-operations-app, ph-ee-importer-rdbms, ph-ee-identity-account-mapper.
eclipselinkVersion=4.0.4

# Database
mysqlVersion=9.1.0

# Cloud storage (ph-ee-operations-app)
azureStorageBlobVersion=12.27.1

# Lombok
lombokVersion=1.18.36

# Mastercard OAuth1 signing (ph-ee-connector-mccbs)
mastercardOauth1Version=1.5.3

# JSON
orgJsonVersion=20240303
# Gson — used by at least five PH-EE components; not managed by the Spring Boot BOM.
gsonVersion=2.11.0

# Testing
junitJupiterVersion=5.11.4
mockitoVersion=5.14.2
